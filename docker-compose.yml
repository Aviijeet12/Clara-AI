version: "3.8"

services:
  clara-ai:
    build: .
    container_name: clara-ai
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persistent volume for generated JSON outputs
      - clara-data:/app/outputs
      # Mount sample transcripts and data for batch processing
      - ./sample-transcripts:/app/sample-transcripts:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  clara-data:
    driver: local
